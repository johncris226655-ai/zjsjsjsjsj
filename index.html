<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Registry</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --red: #bc0000; --bg: #0a0a0a; --gray: #1a1a1a; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; }
        .container { width: 95%; max-width: 500px; border: 1px solid #333; padding: 20px; background: #0f0f0f; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--red); letter-spacing: 3px; border-bottom: 2px solid var(--red); padding-bottom: 10px; }
        
        .camera-box { position: relative; width: 100%; height: 250px; background: #000; border: 2px dashed #444; margin-bottom: 10px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #capturedImage { width: 100%; height: 100%; object-fit: cover; display: none; filter: grayscale(100%) contrast(120%); }
        
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: var(--gray); border: 1px solid #333; color: #fff; box-sizing: border-box; }
        
        /* Signature Overlay */
        #sigOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        #sigCanvas { background: #fff; border: 2px solid var(--red); cursor: crosshair; }
        .sig-tools { margin-top: 10px; }

        button { background: var(--red); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #444; cursor: not-allowed; }
        #loading { display: none; text-align: center; color: var(--red); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" id="regForm">
    <h2>REGISTRATION PROTOCOL</h2>
    
    <div class="camera-box">
        <video id="video" autoplay playsinline></video>
        <img id="capturedImage" alt="ID Shot">
    </div>
    <button id="snap">CAPTURE IDENTITY (50KB)</button>

    <div class="field">
        <label>FULL NAME</label>
        <input type="text" id="userName" placeholder="Lastname, Firstname">
    </div>

    <div class="field">
        <label>DATE OF BIRTH</label>
        <input type="date" id="userDOB">
    </div>

    <div class="field">
        <label>BLOOD TYPE</label>
        <select id="bloodType">
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
        </select>
    </div>

    <div class="field">
        <label>LOCATION (PROVINCE/CITY/BRGY)</label>
        <input type="text" id="locationSearch" placeholder="Search Location (e.g. Muntinlupa)...">
        <select id="locationSelect" size="3">
            <option value="Muntinlupa, Metro Manila">Muntinlupa, Metro Manila</option>
            <option value="Poblacion, Muntinlupa">Poblacion, Muntinlupa</option>
            </select>
    </div>

    <div class="field">
        <label>SIGNATURE</label>
        <div id="sigPreview" style="height: 50px; background: #fff; cursor: pointer;" onclick="openSig()"></div>
    </div>

    <button id="confirmBtn" onclick="submitData()">CONFIRM YOUR IDENTITY</button>
    <div id="loading">UPLOADING TO DATABASE...</div>
</div>

<div id="sigOverlay">
    <span style="position:absolute; right:20px; top:20px; font-size:30px; cursor:pointer;" onclick="closeSig()">×</span>
    <canvas id="sigCanvas" width="320" height="400"></canvas>
    <div class="sig-tools">
        <button onclick="clearSig()" style="width:100px; background:#555;">CLEAR</button>
        <button onclick="saveSig()" style="width:150px;">CONFIRM SIGNATURE</button>
    </div>
</div>

<script>
    emailjs.init("10QvwIDADoRTdj9Nh");

    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    const snap = document.getElementById('snap');
    const capturedImg = document.getElementById('capturedImage');
    let savedPhoto = "";
    let savedSigBase64 = "";

    // Camera Logic
    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => { video.srcObject = stream; });

    snap.onclick = () => {
        canvas.width = 300; canvas.height = 250;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, 300, 250);
        savedPhoto = canvas.toDataURL('image/jpeg', 0.3); // Compressed to stay near 50KB
        capturedImg.src = savedPhoto;
        capturedImg.style.display = 'block';
        video.style.display = 'none';
        snap.disabled = true;
        snap.innerText = "IDENTITY LOCKED";
    };

    // Signature Logic
    const sigCanvas = document.getElementById('sigCanvas');
    const sCtx = sigCanvas.getContext('2d');
    let drawing = false;

    function openSig() { document.getElementById('sigOverlay').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
    function closeSig() { document.getElementById('sigOverlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

    sigCanvas.onmousedown = (e) => { drawing = true; sCtx.beginPath(); sCtx.moveTo(e.offsetX, e.offsetY); };
    sigCanvas.onmousemove = (e) => { if(drawing) { sCtx.lineTo(e.offsetX, e.offsetY); sCtx.stroke(); } };
    sigCanvas.onmouseup = () => { drawing = false; };
    
    // Touch support
    sigCanvas.ontouchstart = (e) => { drawing = true; const t = e.touches[0]; sCtx.beginPath(); sCtx.moveTo(t.clientX - sigCanvas.offsetLeft, t.clientY - sigCanvas.offsetTop); };

    function clearSig() { sCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); }
    function saveSig() {
        savedSigBase64 = sigCanvas.toDataURL();
        document.getElementById('sigPreview').innerHTML = `<img src="${savedSigBase64}" style="height:100%">`;
        closeSig();
    }

    // Submit Logic
    function submitData() {
        const idNumber = Math.floor(10000 + Math.random() * 90000);
        const btn = document.getElementById('confirmBtn');
        const loader = document.getElementById('loading');

        btn.style.display = 'none';
        loader.style.display = 'block';

        const payload = {
            user_name: document.getElementById('userName').value,
            player_id: idNumber,
            location: document.getElementById('locationSelect').value,
            blood_type: document.getElementById('bloodType').value,
            photo: savedPhoto,
            signature: savedSigBase64
        };

        // Save for Checker.html
        localStorage.setItem('player_' + idNumber, JSON.stringify(payload));

        emailjs.send("service_njquc85", "template_7nra9xd", {
            to_email: "refuerzojay7@gmail.com",
            player_name: payload.user_name,
            player_id: idNumber,
            message: `New Identity Registered: ${payload.user_name} | ID: ${idNumber}`
        }).then(() => {
            alert("Protocol Synchronized. Your ID: " + idNumber);
            window.location.reload(); // Next player turn
        });
    }
</script>
</body>
</html>
