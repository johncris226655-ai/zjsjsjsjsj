<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM REGISTRATION</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; overflow-x: hidden; margin: 0; }
        .container { padding: 20px; max-width: 500px; margin: auto; border: 1px solid #333; }
        h2 { text-align: center; letter-spacing: 5px; color: var(--red); text-transform: uppercase; }
        
        /* Camera Section */
        #camera-container { width: 100%; height: 300px; background: #111; position: relative; border: 2px solid var(--red); overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { display: none; }
        #captured-image { width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }
        
        .btn { background: transparent; border: 1px solid var(--red); color: var(--text); padding: 10px; width: 100%; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: var(--red); color: #000; }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }

        input, select { width: 100%; padding: 10px; margin: 8px 0; background: #111; border: 1px solid #444; color: #fff; box-sizing: border-box; }

        /* Signature Overlay */
        #sig-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; touch-action: none; }
        #sig-canvas { background: #fff; display: block; margin: 50px auto; border-radius: 5px; }
        .close-sig { position: absolute; top: 10px; right: 20px; font-size: 30px; color: var(--red); cursor: pointer; }

        #loading { display: none; text-align: center; color: var(--red); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" id="reg-form">
    <h2>Identity Acquisition</h2>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <img id="captured-image">
    </div>
    <button class="btn" id="capture-btn" onclick="capturePhoto()">CAPTURE BIOMETRICS</button>

    <input type="text" id="name" placeholder="FULL NAME">
    <input type="date" id="dob">
    
    <select id="province" onchange="updateCities()">
        <option value="">SELECT PROVINCE</option>
        <option value="Metro Manila">Metro Manila</option>
        <option value="Cavite">Cavite</option>
        <option value="Laguna">Laguna</option>
    </select>

    <select id="city" onchange="updateBrgy()">
        <option value="">SELECT CITY</option>
    </select>

    <select id="brgy">
        <option value="">SELECT BARANGAY</option>
    </select>

    <select id="bloodtype">
        <option value="A+">A+</option><option value="A-">A-</option>
        <option value="B+">B+</option><option value="B-">B-</option>
        <option value="AB+">AB+</option><option value="AB-">AB-</option>
        <option value="O+">O+</option><option value="O-">O-</option>
    </select>

    <div style="border: 1px solid #444; padding: 10px; text-align: center;" onclick="openSignature()">
        <span id="sig-status">CLICK TO SIGN</span>
        <img id="sig-preview" style="display:none; width: 100px; background: white;">
    </div>

    <button class="btn" id="submit-btn" onclick="submitIdentity()">CONFIRM IDENTITY</button>
    <div id="loading">TRANSMITTING...</div>
</div>

<div id="sig-overlay">
    <span class="close-sig" onclick="closeSignature()">×</span>
    <canvas id="sig-canvas"></canvas>
    <button class="btn" style="width: 80%; margin: auto; display: block;" onclick="saveSignature()">CONFIRM SIGNATURE</button>
</div>

<script>
    emailjs.init("10QvwIDADoRTdj9Nh");

    const video = document.getElementById('video');
    const captureBtn = document.getElementById('capture-btn');
    const capturedImg = document.getElementById('captured-image');
    let photoData = "";
    let sigData = "";

    // Camera Access
    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => { video.srcObject = stream; });

    function capturePhoto() {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        photoData = canvas.toDataURL('image/jpeg', 0.5); // Compressed to ~50KB
        
        capturedImg.src = photoData;
        capturedImg.style.display = "block";
        video.style.display = "none";
        captureBtn.disabled = true;
        captureBtn.innerText = "BIOMETRICS LOCKED";
    }

    // Dynamic Location Logic (Sample Data)
    const geoData = {
        "Metro Manila": {
            "Muntinlupa": ["Alabang", "Bayanan", "Buli", "Cupang", "Poblacion", "Putatan", "Tunasan"],
            "Manila": ["Binondo", "Ermita", "Malate", "Quiapo", "Sampaloc"]
        },
        "Cavite": { "Bacoor": ["Molino I", "Molino II"], "Imus": ["Anabu", "Bayan Luma"] }
    };

    function updateCities() {
        const p = document.getElementById('province').value;
        const cSelect = document.getElementById('city');
        cSelect.innerHTML = '<option value="">SELECT CITY</option>';
        if(geoData[p]) Object.keys(geoData[p]).forEach(c => {
            cSelect.innerHTML += `<option value="${c}">${c}</option>`;
        });
    }

    function updateBrgy() {
        const p = document.getElementById('province').value;
        const c = document.getElementById('city').value;
        const bSelect = document.getElementById('brgy');
        bSelect.innerHTML = '<option value="">SELECT BARANGAY</option>';
        if(geoData[p] && geoData[p][c]) geoData[p][c].forEach(b => {
            bSelect.innerHTML += `<option value="${b}">${b}</option>`;
        });
    }

    // Signature Logic
    const sigCanvas = document.getElementById('sig-canvas');
    const ctx = sigCanvas.getContext('2d');
    let drawing = false;

    function openSignature() {
        document.getElementById('sig-overlay').style.display = 'block';
        sigCanvas.width = window.innerWidth * 0.9;
        sigCanvas.height = 300;
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
    }

    sigCanvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.touches[0].clientX - sigCanvas.offsetLeft, e.touches[0].clientY - sigCanvas.offsetTop); });
    sigCanvas.addEventListener('touchmove', (e) => { if(drawing) { ctx.lineTo(e.touches[0].clientX - sigCanvas.offsetLeft, e.touches[0].clientY - sigCanvas.offsetTop); ctx.stroke(); e.preventDefault(); } });
    sigCanvas.addEventListener('touchend', () => { drawing = false; });

    function saveSignature() {
        sigData = sigCanvas.toDataURL();
        document.getElementById('sig-preview').src = sigData;
        document.getElementById('sig-preview').style.display = "inline";
        document.getElementById('sig-status').style.display = "none";
        closeSignature();
    }

    function closeSignature() { document.getElementById('sig-overlay').style.display = 'none'; }

    function submitIdentity() {
        const idCode = Math.floor(10000 + Math.random() * 90000);
        document.getElementById('loading').style.display = "block";
        
        const params = {
            player_name: document.getElementById('name').value,
            player_id: idCode,
            location: `${document.getElementById('brgy').value}, ${document.getElementById('city').value}`,
            to_email: "refuerzojay7@gmail.com"
        };

        emailjs.send("service_njquc85", "template_7nra9xd", params).then(() => {
            const userData = {
                name: params.player_name,
                id: idCode,
                dob: document.getElementById('dob').value,
                loc: params.location,
                blood: document.getElementById('bloodtype').value,
                img: photoData,
                sig: sigData
            };
            localStorage.setItem('user_' + idCode, JSON.stringify(userData));
            alert("IDENTITY LOCKED. CODE: " + idCode);
            location.reload(); 
        });
    }
</script>
</body>
</html>
