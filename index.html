<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM REGISTRATION</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --red: #ff0000; --black: #000; --white: #fff; }
        body { background: var(--black); color: var(--white); font-family: 'Courier New', Courier, monospace; overflow-x: hidden; margin: 0; }
        .glitch-border { border: 2px solid var(--red); box-shadow: 0 0 10px var(--red); margin: 10px; padding: 20px; }
        h1 { text-align: center; color: var(--red); text-transform: uppercase; letter-spacing: 5px; animation: blink 1s infinite; }
        
        /* Camera Section */
        #camera-container { width: 100%; height: 250px; background: #111; border: 1px solid #333; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); } /* Inverted */
        canvas { display: none; }
        #capture-btn { width: 100%; padding: 10px; background: var(--red); color: white; border: none; font-weight: bold; margin-top: 5px; }

        /* Form Styling */
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid var(--red); color: white; box-sizing: border-box; }
        
        /* Signature Overlay */
        #sig-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; }
        #sig-canvas { background: white; width: 90%; height: 70%; margin: 5% auto; display: block; cursor: crosshair; }
        .close-sig { position: absolute; top: 10px; right: 20px; font-size: 30px; color: var(--red); cursor: pointer; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="glitch-border">
    <h1>Identity Registry</h1>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
    </div>
    <button id="capture-btn" onclick="captureImage()">CAPTURE BIOMETRICS</button>
    <img id="photo-preview" style="width:100%; display:none; border: 2px solid var(--red);">

    <input type="text" id="full-name" placeholder="FULL NAME">
    <input type="date" id="dob">
    
    <select id="province" onchange="updateCities()">
        <option>SELECT PROVINCE</option>
        <option value="Metro Manila">Metro Manila</option>
        </select>
    
    <select id="city">
        <option>SELECT CITY/MUNICIPALITY</option>
    </select>

    <input type="text" id="brgy-search" placeholder="SEARCH BARANGAY (42,000+ available)" list="brgy-list">
    <datalist id="brgy-list"></datalist>

    <select id="blood-type">
        <option>BLOOD TYPE</option>
        <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
        <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
    </select>

    <div id="sig-trigger" onclick="openSignature()" style="border:1px dashed var(--red); padding:20px; text-align:center;">
        TAP TO SIGN
    </div>
    <img id="sig-display" style="width:100%; display:none; background:white; margin-top:10px;">

    <button id="submit-btn" onclick="submitData()">SUBMIT YOUR IDENTITY</button>
</div>

<div id="sig-overlay">
    <span class="close-sig" onclick="closeSignature()">X</span>
    <canvas id="sig-canvas"></canvas>
    <button onclick="saveSignature()" style="background:var(--red); color:white;">CONFIRM SIGNATURE</button>
</div>

<script>
    (function(){ emailjs.init("ooYKuT-5bPKBTnXbD"); })();

    const video = document.getElementById('video');
    const captureBtn = document.getElementById('capture-btn');
    let capturedBase64 = "";
    let signatureBase64 = "";

    // Start Camera
    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => { video.srcObject = stream; });

    function captureImage() {
        const canvas = document.createElement('canvas');
        canvas.width = 300; canvas.height = 225;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1); // Invert
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        capturedBase64 = canvas.toDataURL('image/jpeg', 0.5); // Compressed to stay around 50KB
        document.getElementById('photo-preview').src = capturedBase64;
        document.getElementById('photo-preview').style.display = "block";
        video.style.display = "none";
        captureBtn.disabled = true;
        captureBtn.innerText = "BIOMETRICS LOCKED";
        captureBtn.style.background = "#333";
    }

    // Signature Logic
    const sigCanvas = document.getElementById('sig-canvas');
    const ctx = sigCanvas.getContext('2d');
    let drawing = false;

    function openSignature() { 
        document.getElementById('sig-overlay').style.display = 'block';
        sigCanvas.width = window.innerWidth * 0.9;
        sigCanvas.height = window.innerHeight * 0.7;
    }

    sigCanvas.addEventListener('touchstart', e => { drawing = true; ctx.beginPath(); });
    sigCanvas.addEventListener('touchmove', e => { 
        if(!drawing) return;
        const touch = e.touches[0];
        ctx.lineTo(touch.clientX - sigCanvas.offsetLeft, touch.clientY - sigCanvas.offsetTop);
        ctx.stroke();
    });
    sigCanvas.addEventListener('touchend', () => drawing = false);

    function saveSignature() {
        signatureBase64 = sigCanvas.toDataURL();
        document.getElementById('sig-display').src = signatureBase64;
        document.getElementById('sig-display').style.display = "block";
        document.getElementById('sig-trigger').style.display = "none";
        closeSignature();
    }

    function closeSignature() { document.getElementById('sig-overlay').style.display = 'none'; }

    async function submitData() {
        const playerCode = "PX-" + Math.floor(1000 + Math.random() * 9000);
        const data = {
            name: document.getElementById('full-name').value,
            code: playerCode,
            photo: capturedBase64,
            sig: signatureBase64,
            location: `${document.getElementById('city').value}, ${document.getElementById('brgy-search').value}`
        };

        // Save to localStorage for Checker.html
        localStorage.setItem(playerCode, JSON.stringify(data));

        emailjs.send("service_yjcswf2", "template_jzy40rl", {
            player_name: data.name,
            player_id: playerCode,
            location: data.location
        }).then(() => {
            alert("IDENTITY SECURED. NEXT PLAYER TURN.");
            location.reload(); // Quick reset for next player
        });
    }
</script>
</body>
</html>
