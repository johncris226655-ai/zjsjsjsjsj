<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>National Identity Registry</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --med-red: #b30000; --clinical-gray: #f4f4f4; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--clinical-gray); margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border: 2px solid #ccc; box-shadow: 5px 5px 0px #000; }
        h2 { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; color: var(--med-red); }
        
        .camera-box { position: relative; width: 100%; height: 250px; background: #000; margin-bottom: 15px; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #photo-canvas { display: none; width: 100%; height: 100%; transform: scaleX(-1); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 0.8rem; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #000; box-sizing: border-box; }

        /* Signature Overlay */
        #sig-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        canvas#sig-pad { border: 2px dashed #000; background: #fafafa; touch-action: none; }
        
        .btn { 
            background: #000; color: #fff; padding: 12px; width: 100%; border: none; 
            cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s;
        }
        .btn:active { background: var(--med-red); }
        #loading { display: none; text-align: center; font-weight: bold; color: var(--med-red); }
    </style>
</head>
<body>

<div class="container" id="reg-form">
    <h2>IDENTITY REGISTRATION</h2>
    
    <div class="camera-box">
        <video id="video" autoplay playsinline></video>
        <canvas id="photo-canvas"></canvas>
    </div>
    <button class="btn" id="capture-btn" onclick="capturePhoto()">CAPTURE BIOMETRICS</button>

    <div class="form-group">
        <label>FULL NAME:</label>
        <input type="text" id="name" placeholder="Last Name, First Name">
    </div>

    <div class="form-group">
        <label>DATE OF BIRTH:</label>
        <input type="date" id="dob">
    </div>

    <div class="form-group">
        <label>LOCATION (PROVINCE/CITY/BRGY):</label>
        <input type="text" id="location-search" placeholder="Type Province or City..." onkeyup="filterLocation()">
        <select id="location-select" size="5"></select>
    </div>

    <div class="form-group">
        <label>BLOOD TYPE:</label>
        <select id="blood-type">
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
        </select>
    </div>

    <div class="form-group">
        <label>SIGNATURE:</label>
        <div id="sig-preview" style="border:1px solid #000; height: 50px; cursor: pointer; text-align: center; line-height: 50px;" onclick="openSig()">CLICK TO SIGN</div>
    </div>

    <div id="loading">UPLOADING TO DATABASE...</div>
    <button class="btn" id="submit-btn" onclick="submitIdentity()">CONFIRM IDENTITY</button>
</div>

<div id="sig-overlay">
    <h3 style="color: var(--med-red);">LEGAL AUTHORIZATION</h3>
    <canvas id="sig-pad" width="300" height="200"></canvas>
    <div style="width: 300px; display: flex; gap: 10px;">
        <button class="btn" onclick="clearSig()">CLEAR</button>
        <button class="btn" onclick="confirmSig()">CONFIRM</button>
    </div>
</div>

<script>
    (function(){ emailjs.init("10QvwIDADoRTdj9Nh"); })();

    const video = document.getElementById('video');
    const canvas = document.getElementById('photo-canvas');
    const captureBtn = document.getElementById('capture-btn');
    let capturedImg = "";

    // Camera setup
    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => { video.srcObject = stream; });

    function capturePhoto() {
        const context = canvas.getContext('2d');
        canvas.width = 300; canvas.height = 225;
        context.drawImage(video, 0, 0, 300, 225);
        capturedImg = canvas.toDataURL('image/jpeg', 0.5); // Compressed to stay light
        video.style.display = 'none';
        canvas.style.display = 'block';
        captureBtn.disabled = true;
        captureBtn.innerText = "BIOMETRICS FROZEN";
    }

    // Dynamic Location (Sample implementation for Manila/Muntinlupa + Search)
    const locations = ["Manila, NCR", "Muntinlupa, NCR", "Quezon City, NCR", "Cebu City, Cebu", "Davao City, Davao"]; 
    function filterLocation() {
        const val = document.getElementById('location-search').value.toLowerCase();
        const select = document.getElementById('location-select');
        select.innerHTML = "";
        locations.filter(l => l.toLowerCase().includes(val)).forEach(l => {
            let opt = document.createElement('option');
            opt.value = l; opt.innerHTML = l;
            select.appendChild(opt);
        });
    }

    // Signature Logic
    const sigPad = document.getElementById('sig-pad');
    const ctx = sigPad.getContext('2d');
    let drawing = false;

    function openSig() { 
        document.getElementById('sig-overlay').style.display = 'flex'; 
        document.body.style.overflow = 'hidden';
    }

    sigPad.addEventListener('touchstart', e => { drawing = true; ctx.beginPath(); });
    sigPad.addEventListener('touchmove', e => { 
        if(!drawing) return;
        const rect = sigPad.getBoundingClientRect();
        ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        ctx.stroke();
    });
    sigPad.addEventListener('touchend', () => { drawing = false; });

    function confirmSig() {
        const data = sigPad.toDataURL();
        document.getElementById('sig-preview').innerHTML = `<img src="${data}" style="height:100%">`;
        document.getElementById('sig-overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function clearSig() { ctx.clearRect(0, 0, sigPad.width, sigPad.height); }

    function submitIdentity() {
        const idCode = Math.floor(10000 + Math.random() * 90000);
        const name = document.getElementById('name').value;
        if(!name || !capturedImg) return alert("Complete all biometrics!");

        document.getElementById('loading').style.display = 'block';
        
        const templateParams = {
            to_name: "Jeysi",
            player_name: name,
            player_id: idCode,
            message: `New Subject Registered. ID: ${idCode}`
        };

        emailjs.send('service_njquc85', 'template_7nra9xd', templateParams)
            .then(() => {
                localStorage.setItem(idCode, JSON.stringify({
                    name: name,
                    dob: document.getElementById('dob').value,
                    blood: document.getElementById('blood-type').value,
                    photo: capturedImg,
                    sig: sigPad.toDataURL()
                }));
                alert("ID GENERATED: " + idCode);
                window.location.reload(); 
            });
    }
</script>
</body>
</html>
