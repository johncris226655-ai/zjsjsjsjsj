<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDENTITY REGISTRATION | SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --red: #ff0000; --black: #0a0a0a; --white: #ffffff; }
        body { background: var(--black); color: var(--white); font-family: 'Courier New', monospace; overflow-x: hidden; margin: 0; }
        #app { padding: 20px; max-width: 500px; margin: auto; border-left: 2px solid var(--red); border-right: 2px solid var(--red); min-height: 100vh; }
        h2 { text-transform: uppercase; letter-spacing: 5px; text-align: center; border-bottom: 2px solid var(--red); padding-bottom: 10px; }
        
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: var(--red); margin-bottom: 5px; }
        input, select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--red); }

        #camera-container { width: 100%; height: 250px; background: #000; border: 2px solid var(--red); position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas#photo-canvas { display: none; }
        #captured-image { width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }

        .btn { background: var(--red); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .btn:disabled { background: #333; cursor: not-allowed; }

        /* Signature Overlay */
        #sig-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #sig-canvas { background: white; border: 5px solid var(--red); cursor: crosshair; }
        
        #id-display { font-size: 2rem; color: var(--red); text-align: center; margin: 20px 0; display: none; }
    </style>
</head>
<body>

<div id="app">
    <h2>Citizen Registry</h2>
    
    <div class="field">
        <label>BIOMETRIC SCAN (FACE)</label>
        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
            <img id="captured-image">
        </div>
        <button type="button" class="btn" id="capture-btn">Capture Identity (50KB Limit)</button>
    </div>

    <div class="field">
        <label>FULL NAME</label>
        <input type="text" id="name" placeholder="LASTNAME, FIRSTNAME MI.">
    </div>

    <div class="field">
        <label>DATE OF BIRTH</label>
        <input type="date" id="dob">
    </div>

    <div class="field">
        <label>BLOOD TYPE</label>
        <select id="bloodtype">
            <option value="A+">A+</option><option value="A-">A-</option>
            <option value="B+">B+</option><option value="B-">B-</option>
            <option value="AB+">AB+</option><option value="AB-">AB-</option>
            <option value="O+">O+</option><option value="O-">O-</option>
        </select>
    </div>

    <div class="field">
        <label>LOCATION (PROVINCE / CITY / BRGY)</label>
        <select id="province"><option>Loading Provinces...</option></select>
        <select id="city" style="margin-top:5px;"><option>Select Province First</option></select>
        <select id="brgy" style="margin-top:5px;"><option>Select City First</option></select>
    </div>

    <div class="field">
        <label>SIGNATURE</label>
        <button type="button" class="btn" id="open-sig">Doodle / Sign</button>
        <img id="sig-preview" style="width:100%; margin-top:10px; border:1px dashed var(--red); display:none;">
    </div>

    <div id="id-display"></div>
    <button class="btn" id="submit-btn" style="background: #fff; color: #000;">Confirm Your Identity</button>
</div>

<div id="sig-overlay">
    <span style="color:red; margin-bottom:10px;">SIGN WITHIN THE BOX</span>
    <canvas id="sig-canvas"></canvas>
    <div style="width: 300px; display: flex; gap: 10px;">
        <button class="btn" id="clear-sig" style="background:#555">Clear</button>
        <button class="btn" id="save-sig">Confirm</button>
    </div>
</div>

<script>
    (function(){ emailjs.init("ooYKuT-5bPKBTnXbD"); })();

    const video = document.getElementById('video');
    const captureBtn = document.getElementById('capture-btn');
    const capturedImg = document.getElementById('captured-image');
    let capturedBase64 = "";

    // Camera Logic
    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => { video.srcObject = stream; });

    captureBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        
        capturedBase64 = canvas.toDataURL('image/jpeg', 0.5); // Compression to keep near 50KB
        capturedImg.src = capturedBase64;
        capturedImg.style.display = "block";
        video.style.display = "none";
        captureBtn.disabled = true;
        captureBtn.innerText = "IDENTITY FROZEN";
    };

    // Signature Logic
    const sigCanvas = document.getElementById('sig-canvas');
    const signaturePad = new SignaturePad(sigCanvas);
    function resizeCanvas() { 
        sigCanvas.width = 300; sigCanvas.height = 400; 
        signaturePad.clear(); 
    }
    window.addEventListener("resize", resizeCanvas); resizeCanvas();

    document.getElementById('open-sig').onclick = () => document.getElementById('sig-overlay').style.display = 'flex';
    document.getElementById('save-sig').onclick = () => {
        if (signaturePad.isEmpty()) return alert("Sign first");
        document.getElementById('sig-preview').src = signaturePad.toDataURL();
        document.getElementById('sig-preview').style.display = 'block';
        document.getElementById('sig-overlay').style.display = 'none';
    };
    document.getElementById('clear-sig').onclick = () => signaturePad.clear();

    // Location Data (API)
    const provSelect = document.getElementById('province');
    const citySelect = document.getElementById('city');
    const brgySelect = document.getElementById('brgy');

    fetch('https://psgc.gitlab.io/api/provinces/').then(res => res.json()).then(data => {
        provSelect.innerHTML = '<option>Select Province</option>';
        data.sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {
            provSelect.innerHTML += `<option value="${p.code}">${p.name}</option>`;
        });
    });

    provSelect.onchange = () => {
        fetch(`https://psgc.gitlab.io/api/provinces/${provSelect.value}/cities-municipalities/`).then(res => res.json()).then(data => {
            citySelect.innerHTML = '<option>Select City</option>';
            data.sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
                citySelect.innerHTML += `<option value="${c.code}">${c.name}</option>`;
            });
        });
    };

    citySelect.onchange = () => {
        fetch(`https://psgc.gitlab.io/api/cities-municipalities/${citySelect.value}/barangays/`).then(res => res.json()).then(data => {
            brgySelect.innerHTML = '<option>Select Brgy</option>';
            data.sort((a,b) => a.name.localeCompare(b.name)).forEach(b => {
                brgySelect.innerHTML += `<option value="${b.name}">${b.name}</option>`;
            });
        });
    };

    // Submit & Save
    document.getElementById('submit-btn').onclick = function() {
        const idNum = Math.floor(10000 + Math.random() * 90000);
        const userData = {
            name: document.getElementById('name').value,
            id: idNum,
            dob: document.getElementById('dob').value,
            blood: document.getElementById('bloodtype').value,
            loc: `${brgySelect.value}, ${citySelect.options[citySelect.selectedIndex].text}, ${provSelect.options[provSelect.selectedIndex].text}`,
            photo: capturedBase64,
            sig: signaturePad.toDataURL()
        };

        // Save to localStorage for Checker.html
        localStorage.setItem(`player_${idNum}`, JSON.stringify(userData));

        // EmailJS
        emailjs.send("service_yjcswf2", "template_jzy40rl", {
            player_name: userData.name,
            player_id: idNum,
            location: userData.loc
        }).then(() => {
            document.getElementById('id-display').innerText = "ID: " + idNum;
            document.getElementById('id-display').style.display = "block";
            alert("IDENTITY RECORDED. NEXT PLAYER.");
            window.location.reload();
        });
    };
</script>
</body>
</html>
